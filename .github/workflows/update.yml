name: VOLT daily data refresh

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
       - name: Commit updated data
        run: |
          git config user.name  "volt-bot"
          git config user.email "volt-bot@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "VOLT daily data refresh"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "Push attempt $i failed — retrying..."
              sleep 3
            done
          fi
