name: VOLT daily data refresh

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VOLT pipeline
        run: python fetch.py

      - name: Commit updated data
        run: |
          git config user.name  "volt-bot"
          git config user.email "volt-bot@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "VOLT daily data refresh"
            git push
          fi
